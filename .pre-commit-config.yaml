repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch        # PRE_COMMIT_BLOCK_MAIN
        args: [--branch, main]
      - id: check-merge-conflict        # PRE_COMMIT_BLOCK_MERGE_CONFLICT
      - id: detect-private-key          # PRE_COMMIT_BLOCK_PRIVATE_KEY (partial, gitleaks covers more)
      - id: trailing-whitespace         # PRE_COMMIT_BLOCK_TRAILING_WS
      - id: check-added-large-files     # PRE_COMMIT_BLOCK_LARGE_FILES
        args: [--maxkb=5120]
      - id: end-of-file-fixer
      - id: check-ast
      - id: debug-statements
      - id: check-json
      - id: check-yaml

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks                    # PRE_COMMIT_BLOCK_SECRETS + PRE_COMMIT_BLOCK_PRIVATE_KEY

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-bypass-patterns          # PRE_COMMIT_BLOCK_BYPASS_PATTERNS
        name: Block AI bypass patterns
        language: pygrep
        entry: '(?i)(simplified version|quick version|TODO:\s*integrate|skip validation)'
        types: [python]

      - id: no-wip-commit               # COMMIT_MSG_BLOCK_WIP
        name: Block WIP commits
        language: pygrep
        entry: '^(wip|WIP)\b'
        stages: [commit-msg]

      - id: commit-msg-length           # COMMIT_MSG_MAX_SUBJECT_LEN=72
        name: Subject line ≤ 72 chars
        language: system
        entry: >-
          bash -c
          'line=$(head -1 "$1");
          len=${#line};
          if [ -z "${line// }" ]; then echo "❌ Empty commit message"; exit 1; fi;
          if [ "$len" -gt 72 ]; then echo "❌ Subject too long ($len chars, max 72)"; exit 1; fi' --
        stages: [commit-msg]
