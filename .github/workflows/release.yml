name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: uv run pyinstaller fin.spec

      # ── Windows smoke test ───────────────────────────────────────────────────
      - name: Smoke test (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\Fin\Fin.exe" -PassThru -WindowStyle Hidden
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 2
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8888/api/health" -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop
              if ($resp.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) { Write-Error "Health check never responded"; exit 1 }
          Write-Output "Smoke test passed"

      # ── Mac DMG ──────────────────────────────────────────────────────────────
      - name: Install create-dmg (Mac)
        if: matrix.platform == 'mac'
        run: brew install create-dmg

      - name: Build DMG (Mac)
        if: matrix.platform == 'mac'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          create-dmg \
            --volname "Fin" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Fin.app" 175 190 \
            --hide-extension "Fin.app" \
            --app-drop-link 425 190 \
            --skip-jenkins \
            "dist/Fin-${VERSION}.dmg" \
            "dist/Fin.app"

      # ── Windows installer ────────────────────────────────────────────────────
      - name: Build installer (Windows)
        if: matrix.platform == 'windows'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          filepath: installer/fin.iss
          options: /DMyAppVersion=${{ github.ref_name || 'dev' }}

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload DMG artifact
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: Fin-mac
          path: dist/*.dmg

      - name: Upload installer artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Fin-windows
          path: dist/installer/*.exe

      # ── GitHub Release (tag triggers only) ───────────────────────────────────
      - name: Create GitHub Release (Mac)
        if: matrix.platform == 'mac' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true

      - name: Create GitHub Release (Windows)
        if: matrix.platform == 'windows' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
          fail_on_unmatched_files: true
